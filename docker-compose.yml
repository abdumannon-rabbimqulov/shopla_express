version: '3.8'

services:
  db:
    image: postgres:15
    container_name: shopla_postgres
    restart: always
    environment:
      POSTGRES_USER: shopla_user
      POSTGRES_PASSWORD: shopla_password
      POSTGRES_DB: shopla_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shopla_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
